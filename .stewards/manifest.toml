[judgment.public]
do_not = ["Add module-level mutable state without an immutability, lock, or ContextVar story.", "Describe the sandbox as complete isolation."]

[judgment.syntax]
do_not = ["Add a tag without full semantic pipeline closure.", "Move a parse-time error to runtime for convenience."]

[judgment.compiler]
advocate = ["Add a nested call/yield case to the render-surface parity corpus before changing sync-to-stream callback handling."]
do_not = ["Fold time, randomness, I/O, mutation, or unknown-purity calls.", "Hide source-map or output regressions behind snapshot churn."]

[judgment.tests]
do_not = ["Add sleeps for concurrency correctness.", "Broaden tolerances or update snapshots without explaining sensitivity."]

[judgment.benchmarks]
do_not = ["Replace Linux baselines with local Darwin results.", "Benchmark unequal output or unexplained changed workloads."]

[judgment.plan]
do_not = ["Treat an RFC as approval for a stop-and-ask change.", "Leave active-looking zombie plans that contradict shipped code."]

