[[steward]]
id = "root"
path = "AGENTS.md"
point_of_view = "Protect Kida's static component model and route work to the narrowest knowledgeable steward."
edges = [
  { to = "public", type = "governs", what = "installed API and runtime contracts" },
  { to = "syntax", type = "governs", what = "template language" },
  { to = "compiler", type = "governs", what = "AST code generation" },
  { to = "tests", type = "verified-by", what = "executable evidence" },
]

[[steward]]
id = "public"
path = "src/kida/AGENTS.md"
point_of_view = "Represent downstream frameworks and application authors importing Kida under Python 3.14t."
guardrails = [
  "Public exports, signatures, ErrorCode values, strict defaults, loaders, sandbox types, and worker APIs change intentionally and together.",
  "Compiled templates are immutable; render buffers are local; environment registries are copy-on-write; shared caches are lock-guarded.",
  "SandboxedEnvironment reduces capability but does not isolate adversarial code; suspected escapes follow the private reporting protocol in SECURITY.md before public disclosure.",
]
owns.code = ["src/kida/*.py"]
owns.tests = ["tests/test_public_api_snapshot.py", "tests/test_markup_security.py", "tests/test_kida_stress_test.py"]
owns.docs = ["README.md", "CLAUDE.md", "SECURITY.md", "site/content/docs/reference/api.md"]
edges = [{ to = "environment", type = "configured-by", what = "loaders and registries" }, { to = "template", type = "executed-by", what = "render APIs" }]

[[steward]]
id = "cli"
path = "src/kida/_cli/AGENTS.md"
point_of_view = "Keep the kida command facade, lazy dispatch, exit policy, and text/JSON/SARIF output stable and scriptable."
guardrails = ["Commands own their flags and handlers without eager-loading unrelated command modules.", "Machine output preserves codes, fields, coordinates, sorting, and stdout/stderr boundaries."]
owns.code = ["src/kida/_cli/", "src/kida/cli.py", "src/kida/__main__.py"]
owns.tests = ["tests/test_cli.py", "tests/test_cli_command_modules.py", "tests/test_check_diagnostic_formats.py"]
owns.docs = ["site/content/docs/reference/cli.md"]
edges = [{ to = "analysis", type = "presents", what = "static diagnostics" }, { to = "readme", type = "dispatches", what = "README scaffolding" }]

