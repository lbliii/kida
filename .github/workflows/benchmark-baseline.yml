# Generate benchmark baseline for CI regression checks.
# Run manually (Actions → Benchmark baseline → Run workflow) to create
# benchmarks/Linux-CPython-3.14-64bit/*_baseline.json. Download the artifact
# and commit the baseline files to enable regression checks in CI.
name: Benchmark baseline

on:
  workflow_dispatch:

jobs:
  create-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14t"

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Generate baseline
        env:
          CI: true
          PYTHON_GIL: "0"
        run: |
          export PATH="$PWD/.venv/bin:$PATH"
          ./scripts/benchmark_baseline.sh

      - name: Upload baseline
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-baseline-linux
          path: benchmarks/
