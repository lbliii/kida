name: Steward network

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Generated maps and evidence
        run: |
          python .stewards/project.py --check
          python .stewards/verify.py --coverage
