name: 'Kida Report'
description: 'Render CI reports from structured data using kida templates as GitHub step summaries and PR comments.'
author: 'lbliii'

branding:
  icon: 'file-text'
  color: 'blue'

inputs:
  template:
    description: >
      Built-in template name or path to a custom template file. Built-ins:
      pytest, coverage, ruff, ty, jest, gotest, sarif,
      release-notes, release-notes-compact, release-notes-detailed,
      release-notes-terminal, code-review, pr-summary, deploy-preview,
      dependency-review, security-scan, copilot-instructions.
    required: true
  data:
    description: >
      Path to a data file (JSON, JUnit XML, etc.) or "auto" to collect data
      from the GitHub API (only for data-format: github-prs).
    required: true
  data-format:
    description: >
      Format of the data file (json, junit-xml, sarif, lcov, github-prs).
      github-prs collects merged pull requests between two git refs via the
      GitHub API and produces JSON for release-notes templates.
    required: false
    default: 'json'
  post-to:
    description: >
      Where to post the rendered report. Comma-separated list of targets:
      step-summary, pr-comment, release, release-asset, slack, changelog.
    required: false
    default: 'step-summary'
  base-ref:
    description: >
      Base git ref for github-prs collection (tag, branch, or SHA).
      When omitted, auto-detects the previous tag.
    required: false
    default: ''
  head-ref:
    description: >
      Head git ref for github-prs collection. Default: current ref.
    required: false
    default: ''
  release-tag:
    description: >
      Tag name for the GitHub Release when post-to includes "release" or
      "release-asset". Required for those targets.
    required: false
    default: ''
  asset-name:
    description: >
      Filename for the release asset when post-to includes "release-asset".
      Default: "release-notes.md".
    required: false
    default: 'release-notes.md'
  slack-webhook:
    description: >
      Slack incoming webhook URL for post-to: slack. The rendered report is
      sent as the message text.
    required: false
    default: ''
  changelog-path:
    description: >
      Path to the CHANGELOG.md file for post-to: changelog. The rendered
      content is prepended under the [Unreleased] heading.
    required: false
    default: 'CHANGELOG.md'
  render-mode:
    description: >
      Kida rendering mode: markdown (default), terminal, html.
      Terminal mode enables ANSI colors and terminal filters.
    required: false
    default: 'markdown'
  comment-header:
    description: >
      Header text used to identify the PR comment for updates. When posting
      to pr-comment, existing comments with this header are replaced instead
      of creating duplicates. Defaults to the template name.
    required: false
    default: ''
  token:
    description: 'GitHub token for posting PR comments. Only needed when post-to includes pr-comment. Ignored when app-id is provided.'
    required: false
    default: ${{ github.token }}
  app-id:
    description: >
      GitHub App ID for posting PR comments with a branded identity.
      When provided (along with app-private-key), a short-lived token is
      generated automatically and used instead of the token input.
    required: false
    default: ''
  app-private-key:
    description: >
      Private key (PEM) for the GitHub App. Required when app-id is set.
    required: false
    default: ''
  python-version:
    description: 'Python version to use (3.14+). Set to "skip" to skip Python setup.'
    required: false
    default: '3.14'
  install:
    description: 'Whether to install kida via pip. Set to "false" if kida is already available.'
    required: false
    default: 'true'
  kida-command:
    description: 'Command to invoke kida (e.g., "uv run kida" for local dev). Default: "kida".'
    required: false
    default: 'kida'
  fail-under:
    description: >
      Optional numeric threshold. If the data contains a top-level percent_covered
      (coverage) or a computed pass rate (junit-xml) below this value, the step fails.
      Ignored when empty.
    required: false
    default: ''
  comment-mode:
    description: >
      How to handle existing PR comments with the same header.
      "replace" overwrites the comment (default). "append" adds a new section below
      the existing content, useful for combining multiple reports into one comment.
    required: false
    default: 'replace'
  context:
    description: >
      Optional JSON string with extra template variables merged into the data context.
      Example: '{"changed_files": ["src/foo.py", "src/bar.py"]}'
    required: false
    default: ''

outputs:
  report:
    description: 'The rendered markdown report content'
    value: ${{ steps.render.outputs.report }}
  comment-id:
    description: 'The ID of the created/updated PR comment (if post-to includes pr-comment)'
    value: ${{ steps.post.outputs.comment-id }}
  data-file:
    description: 'Path to the collected data JSON (github-prs only). Reuse in subsequent steps.'
    value: ${{ steps.collect.outputs.data_file }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      if: inputs.python-version != 'skip'
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        allow-prereleases: true

    - name: Install kida
      if: inputs.install == 'true'
      shell: bash
      run: python -m pip install --quiet kida-templates

    - name: Resolve template
      id: resolve
      shell: bash
      run: |
        TEMPLATE="${{ inputs.template }}"

        # If it's a file path that exists, use it directly
        if [[ -f "$TEMPLATE" ]]; then
          echo "template=$TEMPLATE" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Check built-in templates (strip -report suffix if present)
        NAME="${TEMPLATE%-report}"
        BUILTIN="${{ github.action_path }}/templates/${NAME}-report.md"
        if [[ -f "$BUILTIN" ]]; then
          echo "template=$BUILTIN" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "::error::Template not found: $TEMPLATE (looked for file and built-in '${NAME}')"
        exit 1

    - name: Collect GitHub PR data
      id: collect
      if: inputs.data-format == 'github-prs'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        REPO="${{ github.repository }}"
        BASE_REF="${{ inputs.base-ref }}"
        HEAD_REF="${{ inputs.head-ref }}"
        DATA_INPUT="${{ inputs.data }}"

        # If data is a file (not "auto"), skip collection.
        if [[ "$DATA_INPUT" != "auto" && -f "$DATA_INPUT" ]]; then
          echo "data_file=$DATA_INPUT" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [[ -z "$HEAD_REF" ]]; then
          HEAD_REF="${{ github.ref_name }}"
        fi

        DATA_FILE="$(mktemp --suffix=.json)"
        python3 "${{ github.action_path }}/action_support/release_notes.py" \
          --repository "$REPO" \
          --base-ref "$BASE_REF" \
          --head-ref "$HEAD_REF" \
          --repository-root "$GITHUB_WORKSPACE" \
          --output "$DATA_FILE"

        echo "data_file=$DATA_FILE" >> "$GITHUB_OUTPUT"

    - name: Render report
      id: render
      shell: bash
      run: |
        OUTPUT_FILE="$(mktemp)"

        # Use collected data file if github-prs format
        DATA_FILE="${{ inputs.data }}"
        if [[ "${{ inputs.data-format }}" == "github-prs" ]]; then
          DATA_FILE="${{ steps.collect.outputs.data_file }}"
        fi

        # Build --set flags from context JSON
        SET_FLAGS=""
        CONTEXT='${{ inputs.context }}'
        if [[ -n "$CONTEXT" ]]; then
          # Parse JSON object keys into --set key=value flags
          while IFS='=' read -r key value; do
            SET_FLAGS="$SET_FLAGS --set $key=$value"
          done < <(echo "$CONTEXT" | python3 -c "
        import json, sys
        ctx = json.load(sys.stdin)
        for k, v in ctx.items():
            print(f'{k}={json.dumps(v)}')
        " 2>/dev/null || true)
        fi

        # Resolve data format for rendering (github-prs produces json)
        RENDER_FORMAT="${{ inputs.data-format }}"
        if [[ "$RENDER_FORMAT" == "github-prs" ]]; then
          RENDER_FORMAT="json"
        fi

        ${{ inputs.kida-command }} render "${{ steps.resolve.outputs.template }}" \
          --data "$DATA_FILE" \
          --data-format "$RENDER_FORMAT" \
          --mode "${{ inputs.render-mode }}" \
          $SET_FLAGS \
          > "$OUTPUT_FILE"

        # Set output (handle multiline)
        {
          echo "report<<KIDA_EOF"
          cat "$OUTPUT_FILE"
          echo "KIDA_EOF"
        } >> "$GITHUB_OUTPUT"

        echo "output_file=$OUTPUT_FILE" >> "$GITHUB_OUTPUT"

    - name: Generate app token
      id: app-token
      if: inputs.app-id != ''
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-private-key }}

    - name: Post report
      id: post
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.app-id != '' && steps.app-token.outputs.token || inputs.token }}
      run: |
        set -euo pipefail

        OUTPUT_FILE="${{ steps.render.outputs.output_file }}"
        POST_TO="${{ inputs.post-to }}"
        TEMPLATE="${{ inputs.template }}"
        HEADER="${{ inputs.comment-header }}"
        COMMENT_MODE="${{ inputs.comment-mode }}"

        # Default header to template name
        if [[ -z "$HEADER" ]]; then
          HEADER="${TEMPLATE%-report}"
          HEADER="${HEADER##*/}"  # strip path
        fi

        # --- step-summary ---
        if echo "$POST_TO" | grep -q "step-summary"; then
          cat "$OUTPUT_FILE" >> "$GITHUB_STEP_SUMMARY"
          echo "Posted to step summary"
        fi

        # --- pr-comment ---
        if echo "$POST_TO" | grep -q "pr-comment"; then
          if ! command -v gh &>/dev/null; then
            echo "::error::post-to includes pr-comment but the GitHub CLI (gh) is not installed."
            exit 1
          fi

          # Find the PR number
          PR_NUMBER=""
          if [[ "${{ github.event_name }}" == "pull_request" || "${{ github.event_name }}" == "pull_request_target" ]]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi

          if [[ -z "$PR_NUMBER" ]]; then
            echo "::warning::post-to includes pr-comment but this is not a pull request event. Skipping."
          else
            MARKER="<!-- kida-report: ${HEADER} -->"
            NEW_CONTENT="$(cat "$OUTPUT_FILE")"

            # Look for an existing comment with our marker (use --arg for safe interpolation)
            EXISTING=$(gh api \
              "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              --paginate --jq '.[] | {id, body}' \
              2>/dev/null | jq -r --arg marker "$MARKER" 'select(.body | startswith($marker)) | "\(.id)\t\(.body)"' | head -1)

            EXISTING_ID=$(echo "$EXISTING" | cut -f1)
            EXISTING_BODY=$(echo "$EXISTING" | cut -f2-)

            if [[ -n "$EXISTING_ID" && "$COMMENT_MODE" == "append" ]]; then
              # Append: add new content below existing body
              BODY="${EXISTING_BODY}

        ---

        ${NEW_CONTENT}"
              gh api \
                "repos/${{ github.repository }}/issues/comments/${EXISTING_ID}" \
                -X PATCH -f body="$BODY" --silent
              echo "Appended to PR comment $EXISTING_ID"
              echo "comment-id=$EXISTING_ID" >> "$GITHUB_OUTPUT"
            elif [[ -n "$EXISTING_ID" ]]; then
              # Replace: overwrite with new content
              BODY="${MARKER}
        ${NEW_CONTENT}"
              gh api \
                "repos/${{ github.repository }}/issues/comments/${EXISTING_ID}" \
                -X PATCH -f body="$BODY" --silent
              echo "Updated PR comment $EXISTING_ID"
              echo "comment-id=$EXISTING_ID" >> "$GITHUB_OUTPUT"
            else
              # Create new comment
              BODY="${MARKER}
        ${NEW_CONTENT}"
              COMMENT_ID=$(gh api \
                "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
                -f body="$BODY" --jq '.id')
              echo "Created PR comment $COMMENT_ID"
              echo "comment-id=$COMMENT_ID" >> "$GITHUB_OUTPUT"
            fi
          fi
        fi

        # --- release ---
        if [[ ",$POST_TO," == *",release,"* ]]; then
          RELEASE_TAG="${{ inputs.release-tag }}"
          if [[ -z "$RELEASE_TAG" ]]; then
            echo "::error::post-to includes release but release-tag is not set."
            exit 1
          fi

          RELEASE_BODY="$(cat "$OUTPUT_FILE")"

          # Check if release exists
          if gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" &>/dev/null; then
            gh release edit "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --notes "$RELEASE_BODY"
            echo "Updated release $RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --title "$RELEASE_TAG" \
              --notes "$RELEASE_BODY"
            echo "Created release $RELEASE_TAG"
          fi
        fi

        # --- release-asset ---
        if echo "$POST_TO" | grep -q "release-asset"; then
          RELEASE_TAG="${{ inputs.release-tag }}"
          ASSET_NAME="${{ inputs.asset-name }}"
          if [[ -z "$RELEASE_TAG" ]]; then
            echo "::error::post-to includes release-asset but release-tag is not set."
            exit 1
          fi

          # Copy to a named file for upload
          ASSET_FILE="$(mktemp -d)/${ASSET_NAME}"
          cp "$OUTPUT_FILE" "$ASSET_FILE"

          # Wait for release to exist (may have just been created above)
          for i in 1 2 3; do
            if gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" &>/dev/null; then
              break
            fi
            sleep 2
          done

          # Delete existing asset with same name, then upload
          gh release delete-asset "$RELEASE_TAG" "$ASSET_NAME" \
            --repo "${{ github.repository }}" --yes 2>/dev/null || true
          gh release upload "$RELEASE_TAG" "$ASSET_FILE" \
            --repo "${{ github.repository }}"
          echo "Uploaded release asset: $ASSET_NAME"
          rm -f "$ASSET_FILE"
        fi

        # --- slack ---
        if echo "$POST_TO" | grep -q "slack"; then
          WEBHOOK="${{ inputs.slack-webhook }}"
          if [[ -z "$WEBHOOK" ]]; then
            echo "::error::post-to includes slack but slack-webhook is not set."
            exit 1
          fi

          SLACK_TEXT="$(cat "$OUTPUT_FILE")"
          # Truncate to Slack's 40k char limit
          if [[ ${#SLACK_TEXT} -gt 39000 ]]; then
            SLACK_TEXT="${SLACK_TEXT:0:39000}..."
          fi

          # Post to Slack via webhook
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$WEBHOOK" \
            -H 'Content-Type: application/json' \
            --data "$(python3 -c "
        import json, sys
        text = open('$OUTPUT_FILE').read()
        if len(text) > 39000:
            text = text[:39000] + '...'
        print(json.dumps({'text': text}))
        ")")

          if [[ "$HTTP_CODE" == "200" ]]; then
            echo "Posted to Slack"
          else
            echo "::warning::Slack webhook returned HTTP $HTTP_CODE"
          fi
        fi

        # --- changelog ---
        if echo "$POST_TO" | grep -q "changelog"; then
          CHANGELOG="${{ inputs.changelog-path }}"
          NEW_ENTRY="$(cat "$OUTPUT_FILE")"

          if [[ -f "$CHANGELOG" ]]; then
            # Insert after [Unreleased] heading (or at top if not found)
            python3 -c "
        import re

        changelog = open('$CHANGELOG', 'r').read()
        new_entry = open('$OUTPUT_FILE', 'r').read().strip()

        # Find the [Unreleased] section and insert after it
        pattern = r'(## \[Unreleased\].*?\n)'
        match = re.search(pattern, changelog)
        if match:
            insert_pos = match.end()
            updated = changelog[:insert_pos] + '\n' + new_entry + '\n\n' + changelog[insert_pos:]
        else:
            # No [Unreleased] heading — insert after first heading
            first_h2 = changelog.find('\n## ')
            if first_h2 >= 0:
                updated = changelog[:first_h2+1] + new_entry + '\n\n' + changelog[first_h2+1:]
            else:
                updated = new_entry + '\n\n' + changelog

        open('$CHANGELOG', 'w').write(updated)
        "
            echo "Updated $CHANGELOG"
          else
            # Create new changelog
            cat "$OUTPUT_FILE" > "$CHANGELOG"
            echo "Created $CHANGELOG"
          fi
        fi

        # Clean up
        rm -f "$OUTPUT_FILE"

    - name: Check fail-under threshold
      if: inputs.fail-under != ''
      shell: bash
      run: |
        THRESHOLD="${{ inputs.fail-under }}"
        DATA_FILE="${{ inputs.data }}"
        DATA_FORMAT="${{ inputs.data-format }}"

        # Skip for non-metric formats
        if [[ "$DATA_FORMAT" == "github-prs" ]]; then
          echo "::notice::fail-under is not applicable to github-prs format"
          exit 0
        fi

        # Extract the relevant metric based on data format
        if [[ "$DATA_FORMAT" == "junit-xml" ]]; then
          # Compute pass rate from JUnit XML
          METRIC=$(python3 -c "
        import xml.etree.ElementTree as ET, sys
        tree = ET.parse('$DATA_FILE')
        root = tree.getroot()
        suites = root.findall('.//testsuite') if root.tag == 'testsuites' else [root]
        total = sum(int(s.get('tests', 0)) for s in suites)
        failures = sum(int(s.get('failures', 0)) for s in suites)
        errors = sum(int(s.get('errors', 0)) for s in suites)
        rate = ((total - failures - errors) / total * 100) if total > 0 else 0
        print(f'{rate:.1f}')
        ")
          LABEL="pass rate"
        elif [[ "$DATA_FORMAT" == "lcov" ]]; then
          METRIC=$(python3 -c "
        found = hit = 0
        for line in open('$DATA_FILE'):
            if line.startswith('LF:'): found += int(line.split(':')[1])
            elif line.startswith('LH:'): hit += int(line.split(':')[1])
        print(f'{(hit/found*100) if found else 0:.1f}')
        ")
          LABEL="line coverage"
        else
          # JSON: look for percent_covered at top level or in totals
          METRIC=$(python3 -c "
        import json
        d = json.load(open('$DATA_FILE'))
        pct = d.get('percent_covered') or (d.get('totals', {}).get('percent_covered'))
        print(f'{float(pct):.1f}' if pct is not None else '')
        ")
          LABEL="coverage"
        fi

        if [[ -z "$METRIC" ]]; then
          echo "::warning::fail-under set but no metric found in data — skipping threshold check"
          exit 0
        fi

        PASS=$(python3 -c "print('yes' if float('$METRIC') >= float('$THRESHOLD') else 'no')")
        if [[ "$PASS" == "no" ]]; then
          echo "::error::${LABEL} ${METRIC}% is below threshold ${THRESHOLD}%"
          exit 1
        else
          echo "${LABEL} ${METRIC}% meets threshold ${THRESHOLD}%"
        fi
