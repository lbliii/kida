name: 'Kida Report'
description: 'Render CI reports from structured data using kida templates. Turn pytest, coverage, ruff, and other tool output into formatted GitHub step summaries and PR comments.'
author: 'lbliii'

branding:
  icon: 'file-text'
  color: 'blue'

inputs:
  template:
    description: >
      Built-in template name (pytest, coverage, ruff, ty, jest, gotest, sarif) or
      path to a custom template file in your repository.
    required: true
  data:
    description: 'Path to the data file (JSON, JUnit XML, etc.)'
    required: true
  data-format:
    description: 'Format of the data file (json, junit-xml, sarif, lcov)'
    required: false
    default: 'json'
  post-to:
    description: >
      Where to post the rendered report. Comma-separated list of targets:
      step-summary, pr-comment. Default: step-summary.
    required: false
    default: 'step-summary'
  comment-header:
    description: >
      Header text used to identify the PR comment for updates. When posting
      to pr-comment, existing comments with this header are replaced instead
      of creating duplicates. Defaults to the template name.
    required: false
    default: ''
  token:
    description: 'GitHub token for posting PR comments. Only needed when post-to includes pr-comment.'
    required: false
    default: ${{ github.token }}
  python-version:
    description: 'Python version to use (3.12+). Set to "skip" to skip Python setup.'
    required: false
    default: '3.12'
  install:
    description: 'Whether to install kida via pip. Set to "false" if kida is already available.'
    required: false
    default: 'true'
  kida-command:
    description: 'Command to invoke kida (e.g., "uv run kida" for local dev). Default: "kida".'
    required: false
    default: 'kida'
  fail-under:
    description: >
      Optional numeric threshold. If the data contains a top-level percent_covered
      (coverage) or a computed pass rate (junit-xml) below this value, the step fails.
      Ignored when empty.
    required: false
    default: ''
  comment-mode:
    description: >
      How to handle existing PR comments with the same header.
      "replace" overwrites the comment (default). "append" adds a new section below
      the existing content, useful for combining multiple reports into one comment.
    required: false
    default: 'replace'
  context:
    description: >
      Optional JSON string with extra template variables merged into the data context.
      Example: '{"changed_files": ["src/foo.py", "src/bar.py"]}'
    required: false
    default: ''

outputs:
  report:
    description: 'The rendered markdown report content'
    value: ${{ steps.render.outputs.report }}
  comment-id:
    description: 'The ID of the created/updated PR comment (if post-to includes pr-comment)'
    value: ${{ steps.post.outputs.comment-id }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      if: inputs.python-version != 'skip'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install kida
      if: inputs.install == 'true'
      shell: bash
      run: python -m pip install --quiet kida-templates

    - name: Resolve template
      id: resolve
      shell: bash
      run: |
        TEMPLATE="${{ inputs.template }}"

        # If it's a file path that exists, use it directly
        if [[ -f "$TEMPLATE" ]]; then
          echo "template=$TEMPLATE" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Check built-in templates (strip -report suffix if present)
        NAME="${TEMPLATE%-report}"
        BUILTIN="${{ github.action_path }}/templates/${NAME}-report.md"
        if [[ -f "$BUILTIN" ]]; then
          echo "template=$BUILTIN" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "::error::Template not found: $TEMPLATE (looked for file and built-in '${NAME}')"
        exit 1

    - name: Render report
      id: render
      shell: bash
      run: |
        OUTPUT_FILE="$(mktemp)"

        # Build --set flags from context JSON
        SET_FLAGS=""
        CONTEXT='${{ inputs.context }}'
        if [[ -n "$CONTEXT" ]]; then
          # Parse JSON object keys into --set key=value flags
          while IFS='=' read -r key value; do
            SET_FLAGS="$SET_FLAGS --set $key=$value"
          done < <(echo "$CONTEXT" | python3 -c "
        import json, sys
        ctx = json.load(sys.stdin)
        for k, v in ctx.items():
            print(f'{k}={json.dumps(v)}')
        " 2>/dev/null || true)
        fi

        ${{ inputs.kida-command }} render "${{ steps.resolve.outputs.template }}" \
          --data "${{ inputs.data }}" \
          --data-format "${{ inputs.data-format }}" \
          --mode markdown \
          $SET_FLAGS \
          > "$OUTPUT_FILE"

        # Set output (handle multiline)
        {
          echo "report<<KIDA_EOF"
          cat "$OUTPUT_FILE"
          echo "KIDA_EOF"
        } >> "$GITHUB_OUTPUT"

        echo "output_file=$OUTPUT_FILE" >> "$GITHUB_OUTPUT"

    - name: Post report
      id: post
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        OUTPUT_FILE="${{ steps.render.outputs.output_file }}"
        POST_TO="${{ inputs.post-to }}"
        TEMPLATE="${{ inputs.template }}"
        HEADER="${{ inputs.comment-header }}"
        COMMENT_MODE="${{ inputs.comment-mode }}"

        # Default header to template name
        if [[ -z "$HEADER" ]]; then
          HEADER="${TEMPLATE%-report}"
          HEADER="${HEADER##*/}"  # strip path
        fi

        # --- step-summary ---
        if echo "$POST_TO" | grep -q "step-summary"; then
          cat "$OUTPUT_FILE" >> "$GITHUB_STEP_SUMMARY"
          echo "Posted to step summary"
        fi

        # --- pr-comment ---
        if echo "$POST_TO" | grep -q "pr-comment"; then
          if ! command -v gh &>/dev/null; then
            echo "::error::post-to includes pr-comment but the GitHub CLI (gh) is not installed."
            exit 1
          fi

          # Find the PR number
          PR_NUMBER=""
          if [[ "${{ github.event_name }}" == "pull_request" || "${{ github.event_name }}" == "pull_request_target" ]]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi

          if [[ -z "$PR_NUMBER" ]]; then
            echo "::warning::post-to includes pr-comment but this is not a pull request event. Skipping."
          else
            MARKER="<!-- kida-report: ${HEADER} -->"
            NEW_CONTENT="$(cat "$OUTPUT_FILE")"

            # Look for an existing comment with our marker (use --arg for safe interpolation)
            EXISTING=$(gh api \
              "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              --paginate --jq '.[] | {id, body}' \
              2>/dev/null | jq -r --arg marker "$MARKER" 'select(.body | startswith($marker)) | "\(.id)\t\(.body)"' | head -1)

            EXISTING_ID=$(echo "$EXISTING" | cut -f1)
            EXISTING_BODY=$(echo "$EXISTING" | cut -f2-)

            if [[ -n "$EXISTING_ID" && "$COMMENT_MODE" == "append" ]]; then
              # Append: add new content below existing body
              BODY="${EXISTING_BODY}

        ---

        ${NEW_CONTENT}"
              gh api \
                "repos/${{ github.repository }}/issues/comments/${EXISTING_ID}" \
                -X PATCH -f body="$BODY" --silent
              echo "Appended to PR comment $EXISTING_ID"
              echo "comment-id=$EXISTING_ID" >> "$GITHUB_OUTPUT"
            elif [[ -n "$EXISTING_ID" ]]; then
              # Replace: overwrite with new content
              BODY="${MARKER}
        ${NEW_CONTENT}"
              gh api \
                "repos/${{ github.repository }}/issues/comments/${EXISTING_ID}" \
                -X PATCH -f body="$BODY" --silent
              echo "Updated PR comment $EXISTING_ID"
              echo "comment-id=$EXISTING_ID" >> "$GITHUB_OUTPUT"
            else
              # Create new comment
              BODY="${MARKER}
        ${NEW_CONTENT}"
              COMMENT_ID=$(gh api \
                "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
                -f body="$BODY" --jq '.id')
              echo "Created PR comment $COMMENT_ID"
              echo "comment-id=$COMMENT_ID" >> "$GITHUB_OUTPUT"
            fi
          fi
        fi

        # Clean up
        rm -f "$OUTPUT_FILE"

    - name: Check fail-under threshold
      if: inputs.fail-under != ''
      shell: bash
      run: |
        THRESHOLD="${{ inputs.fail-under }}"
        DATA_FILE="${{ inputs.data }}"
        DATA_FORMAT="${{ inputs.data-format }}"

        # Extract the relevant metric based on data format
        if [[ "$DATA_FORMAT" == "junit-xml" ]]; then
          # Compute pass rate from JUnit XML
          METRIC=$(python3 -c "
        import xml.etree.ElementTree as ET, sys
        tree = ET.parse('$DATA_FILE')
        root = tree.getroot()
        suites = root.findall('.//testsuite') if root.tag == 'testsuites' else [root]
        total = sum(int(s.get('tests', 0)) for s in suites)
        failures = sum(int(s.get('failures', 0)) for s in suites)
        errors = sum(int(s.get('errors', 0)) for s in suites)
        rate = ((total - failures - errors) / total * 100) if total > 0 else 0
        print(f'{rate:.1f}')
        ")
          LABEL="pass rate"
        elif [[ "$DATA_FORMAT" == "lcov" ]]; then
          METRIC=$(python3 -c "
        found = hit = 0
        for line in open('$DATA_FILE'):
            if line.startswith('LF:'): found += int(line.split(':')[1])
            elif line.startswith('LH:'): hit += int(line.split(':')[1])
        print(f'{(hit/found*100) if found else 0:.1f}')
        ")
          LABEL="line coverage"
        else
          # JSON: look for percent_covered at top level or in totals
          METRIC=$(python3 -c "
        import json
        d = json.load(open('$DATA_FILE'))
        pct = d.get('percent_covered') or (d.get('totals', {}).get('percent_covered'))
        print(f'{float(pct):.1f}' if pct is not None else '')
        ")
          LABEL="coverage"
        fi

        if [[ -z "$METRIC" ]]; then
          echo "::warning::fail-under set but no metric found in data — skipping threshold check"
          exit 0
        fi

        PASS=$(python3 -c "print('yes' if float('$METRIC') >= float('$THRESHOLD') else 'no')")
        if [[ "$PASS" == "no" ]]; then
          echo "::error::${LABEL} ${METRIC}% is below threshold ${THRESHOLD}%"
          exit 1
        else
          echo "${LABEL} ${METRIC}% meets threshold ${THRESHOLD}%"
        fi
